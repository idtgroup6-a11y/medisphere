<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#2563EB">
<title>Health Tracker | MediSphere</title>
<link rel="icon" type="image/png" href="favicon.png">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css)">
<link rel="stylesheet" href="assets/css/style.css">
</head><body class="hero-bg">

<div class="glow" style="top:-100px;right:-100px;"></div>
<div id="header"></div>

<main class="page" style="max-width:900px;margin:0 auto;padding:18px;position:relative;z-index:1;">
  <h2 class="page-title">📊 Health Tracker</h2>
  <p class="page-subtitle">Monitor your vital signs over time</p>

  <div class="card" style="padding:20px;margin-bottom:14px;">
    <form id="form" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;">
      <select id="metric_type" class="input">
        <option value="weight">Weight (kg)</option>
        <option value="bp">Blood Pressure</option>
        <option value="sugar">Blood Sugar</option>
        <option value="heart_rate">Heart Rate</option>
        <option value="temperature">Temperature</option>
        <option value="oxygen">Oxygen Saturation</option>
      </select>
      <input id="value" class="input" placeholder="Value (e.g. 120/80)" required>
      <input id="unit" class="input" placeholder="Unit">
      <button class="btn-primary" type="submit"><i class="fa-solid fa-plus"></i> Add</button>
    </form>
  </div>

  <div class="card" style="padding:20px;margin-bottom:14px;">
    <h3 style="font-weight:700;font-size:15px;margin-bottom:12px;display:flex;align-items:center;gap:8px;">
      <i class="fa-solid fa-chart-line" style="color:var(--primary);"></i> Trend
    </h3>
    <canvas id="chart" height="100"></canvas>
  </div>

  <h3 style="font-weight:700;font-size:15px;margin:14px 0 10px;color:var(--text);">Recent Entries</h3>
  <div id="list"></div>

  <a href="card.html" class="btn-ghost" style="display:block;text-align:center;margin-top:18px;text-decoration:none;">
    <i class="fa-solid fa-id-card"></i> View Digital Health Card
  </a>
</main>

<div id="nav"></div>

<script src="assets/js/app.js"></script>
<script>
const u = Auth.require(['patient']); if (u) init();
let chart;

async function init() {
  document.getElementById('header').innerHTML = renderHeader('Health Tracker');
  document.getElementById('nav').innerHTML = renderBottomNav('profile.html');
  await load();
  document.getElementById('metric_type').addEventListener('change', load);
}

async function load() {
  const list = document.getElementById('list');
  list.innerHTML = skeletonCards(3, 60);
  try {
    const data = await api('/health-metrics');
    list.innerHTML = data.length ? data.slice(0, 10).map(m => `
      <div class="card" style="padding:12px 16px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;">
        <div style="display:flex;gap:12px;align-items:center;">
          <div style="width:38px;height:38px;border-radius:10px;background:#eff6ff;color:var(--primary);display:flex;align-items:center;justify-content:center;">
            <i class="fa-solid fa-heart-pulse"></i>
          </div>
          <div>
            <div style="font-weight:600;text-transform:capitalize;">${m.metric_type.replace('_',' ')}</div>
            <div style="font-size:11px;color:var(--muted);">${fmtDateTime(m.recorded_at)}</div>
          </div>
        </div>
        <div style="font-weight:700;color:var(--primary);">${m.value} <span style="font-size:11px;color:var(--muted);">${m.unit || ''}</span></div>
      </div>`).join('') : emptyState('fa-heart-pulse', 'No entries yet', 'Add your first measurement above');

    const type = document.getElementById('metric_type').value;
    const series = data.filter(d => d.metric_type === type).reverse();
    const labels = series.map(d => fmtDate(d.recorded_at));
    const values = series.map(d => parseFloat((d.value || '').toString().split('/')[0]) || 0);
    if (chart) chart.destroy();
    chart = new Chart(document.getElementById('chart'), {
      type: 'line',
      data: { labels, datasets: [{
        label: type, data: values,
        borderColor: '#2563EB', backgroundColor: 'rgba(37,99,235,0.1)',
        tension: 0.35, fill: true, pointRadius: 4, pointBackgroundColor: '#2563EB'
      }]},
      options: { plugins: { legend: { display: false } }, scales: { y: { grid: { color: '#f1f5f9' } }, x: { grid: { display: false } } } }
    });
  } catch (e) {
    list.innerHTML = emptyState('fa-triangle-exclamation', 'Could not load', e.message);
  }
}

document.getElementById('form').addEventListener('submit', async e => {
  e.preventDefault();
  try {
    await api('/health-metrics', { method: 'POST', body: {
      metric_type: metric_type.value, value: value.value, unit: unit.value
    }});
    toast('Saved', 'success'); value.value = ''; load();
  } catch (err) { toast(err.message, 'error'); }
});
</script>
</body></html>

<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#2563EB">
<title>Lab Reports | MediSphere</title>
<link rel="icon" type="image/png" href="favicon.png">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="assets/css/style.css">
</head><body class="hero-bg">

<div class="glow" style="top:-100px;right:-100px;"></div>
<div id="header"></div>

<main class="page" style="max-width:900px;margin:0 auto;padding:18px;position:relative;z-index:1;">
  <h2 class="page-title">🧪 Lab Reports</h2>
  <p class="page-subtitle">View and manage your medical reports</p>

  <div class="search-wrap">
    <i class="fa-solid fa-magnifying-glass"></i>
    <input id="search" class="input" placeholder="Search reports…">
  </div>
  <div id="list"></div>
</main>

<button class="fab" id="fab"><i class="fa-solid fa-plus"></i></button>
<div id="nav"></div>

<div id="modal" class="modal-overlay">
  <div class="modal-content">
    <div class="modal-header">
      <div class="modal-title"><i class="fa-solid fa-flask" style="color:var(--primary);"></i> Upload Report</div>
      <button class="modal-close" onclick="closeModal('modal')"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div id="modalNotice" style="display:none;"></div>
    <form id="repForm" style="display:flex;flex-direction:column;gap:12px;" autocomplete="off">
      <div class="input-wrap">
        <i class="fa-solid fa-file-medical field-icon"></i>
        <input id="report_name" class="input" placeholder="Report Name" required>
      </div>
      <div class="input-wrap">
        <i class="fa-solid fa-tag field-icon"></i>
        <input id="report_type" class="input" placeholder="Type (Blood, X-Ray, MRI...)">
      </div>
      <div class="input-wrap">
        <i class="fa-solid fa-link field-icon"></i>
        <input id="file_url" class="input" placeholder="File URL">
      </div>
      <div class="input-wrap">
        <i class="fa-regular fa-calendar field-icon"></i>
        <input id="report_date" type="date" class="input">
      </div>
      <textarea id="notes" class="input" placeholder="Notes"></textarea>
      <div style="display:flex;gap:10px;">
        <button type="button" class="btn-ghost" onclick="closeModal('modal')" style="flex:1;">Cancel</button>
        <button class="btn-primary" type="submit" style="flex:1;"><i class="fa-solid fa-check"></i> Save</button>
      </div>
    </form>
  </div>
</div>

<script src="assets/js/app.js"></script>
<script>
const u = Auth.require(); if (u) init();
let allReports = [];

async function init() {
  document.getElementById('header').innerHTML = renderHeader('Reports');
  document.getElementById('nav').innerHTML = renderBottomNav('reports.html');
  await load();
  document.getElementById('search').addEventListener('input', render);
}

async function load() {
  const list = document.getElementById('list');
  list.innerHTML = skeletonCards(3, 80);
  try {
    allReports = await api('/reports');
    render();
  } catch (e) {
    list.innerHTML = emptyState('fa-triangle-exclamation', 'Could not load', e.message);
  }
}

function render() {
  const q = (document.getElementById('search').value || '').toLowerCase();
  const filtered = allReports.filter(r =>
    !q || (r.report_name || '').toLowerCase().includes(q) || (r.report_type || '').toLowerCase().includes(q)
  );
  const list = document.getElementById('list');
  if (!filtered.length) {
    list.innerHTML = emptyState('fa-folder-open', 'No reports', 'Tap + to upload your first report');
    return;
  }
  list.innerHTML = filtered.map(r => `
    <div class="card" style="padding:16px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;gap:12px;">
      <div style="display:flex;gap:12px;align-items:center;flex:1;">
        <div style="width:46px;height:46px;border-radius:12px;background:#cffafe;color:#0891b2;display:flex;align-items:center;justify-content:center;font-size:18px;">
          <i class="fa-solid fa-flask"></i>
        </div>
        <div>
          <div style="font-weight:600;">${r.report_name}</div>
          <div style="font-size:12px;color:var(--muted);">${r.report_type || 'Report'} • ${fmtDate(r.report_date)}</div>
        </div>
      </div>
      ${r.file_url ? `<a href="${r.file_url}" target="_blank" rel="noopener" class="btn-ghost" style="padding:8px 14px;font-size:12px;text-decoration:none;">
        <i class="fa-solid fa-eye"></i> View
      </a>` : ''}
    </div>`).join('');
}

document.getElementById('fab').onclick = () => openModal('modal');

document.getElementById('repForm').addEventListener('submit', async e => {
  e.preventDefault();
  clearNotice('modalNotice');
  const btn = e.target.querySelector('button[type=submit]');
  btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
  try {
    await api('/reports', { method: 'POST', body: {
      report_name: report_name.value, report_type: report_type.value,
      file_url: file_url.value, report_date: report_date.value || null, notes: notes.value
    }});
    toast('Report saved', 'success');
    closeModal('modal'); e.target.reset(); load();
  } catch (err) { showNotice('modalNotice', 'err', err.message); }
  finally { btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-check"></i> Save'; }
});
</script>
</body></html>

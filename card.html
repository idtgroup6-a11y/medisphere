<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#2563EB">
<title>Digital Card | MediSphere</title>
<link rel="icon" type="image/png" href="favicon.png">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="assets/css/style.css">
</head><body class="hero-bg">

<div class="glow" style="top:-100px;right:-100px;"></div>
<div class="glow" style="bottom:-120px;left:-120px;"></div>
<div id="header"></div>

<main class="page" style="max-width:560px;margin:0 auto;padding:18px;position:relative;z-index:1;">
  <h2 class="page-title">🪪 Digital Health Card</h2>
  <p class="page-subtitle">Your portable medical identity</p>

  <div id="card"></div>

  <button id="dlBtn" class="btn-primary" style="width:100%;margin-top:14px;padding:14px;">
    <i class="fa-solid fa-download"></i> Download PDF
  </button>
</main>

<div id="nav"></div>

<script src="assets/js/app.js"></script>
<script>
const u = Auth.require(); if (u) init();
const code = new URLSearchParams(location.search).get('code') || u.user_code;

async function init() {
  document.getElementById('header').innerHTML = renderHeader('Digital Card');
  document.getElementById('nav').innerHTML = renderBottomNav('profile.html');
  const cardEl = document.getElementById('card');
  cardEl.innerHTML = '<div class="skeleton" style="height:280px;border-radius:24px;"></div>';
  try {
    const data = await api('/card/' + code);
    const x = data.user, d = data.details || {};
    cardEl.innerHTML = `
      <div style="background:linear-gradient(135deg,#1D4ED8,#2563EB,#3B82F6);color:white;border-radius:24px;padding:28px;box-shadow:0 20px 48px rgba(37,99,235,0.35);position:relative;overflow:hidden;">
        <div style="position:absolute;top:-60px;right:-60px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,0.08);"></div>
        <div style="position:absolute;bottom:-80px;left:-40px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,0.06);"></div>

        <div style="display:flex;justify-content:space-between;align-items:center;position:relative;z-index:1;">
          <div>
            <div style="font-size:13px;opacity:0.9;font-weight:600;">MediSphere</div>
            <div style="font-size:11px;opacity:0.7;text-transform:uppercase;letter-spacing:1.5px;">${x.role} card</div>
          </div>
          <div style="width:44px;height:44px;border-radius:12px;background:rgba(255,255,255,0.18);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;">M</div>
        </div>

        <div style="display:flex;justify-content:space-between;align-items:end;margin-top:36px;position:relative;z-index:1;gap:14px;">
          <div style="flex:1;min-width:0;">
            <div style="font-size:22px;font-weight:700;line-height:1.2;">${x.full_name}</div>
            <div style="font-size:13px;opacity:0.9;margin-top:2px;font-family:monospace;letter-spacing:1px;">${x.user_code}</div>
            <div style="font-size:12px;opacity:0.85;margin-top:12px;display:flex;flex-direction:column;gap:4px;">
              <span><i class="fa-solid fa-phone" style="width:16px;"></i> ${x.phone || '—'}</span>
              ${x.role === 'patient' ? `
                <span><i class="fa-solid fa-droplet" style="width:16px;"></i> ${d.blood_group || '—'}</span>
                <span><i class="fa-solid fa-cake-candles" style="width:16px;"></i> ${x.dob || '—'}</span>
                <span><i class="fa-solid fa-phone-volume" style="width:16px;"></i> ${d.emergency_contact || '—'}</span>
              ` : `
                <span><i class="fa-solid fa-stethoscope" style="width:16px;"></i> ${d.specialization || '—'}</span>
                <span><i class="fa-solid fa-hospital" style="width:16px;"></i> ${d.hospital_name || '—'}</span>
                <span><i class="fa-solid fa-id-badge" style="width:16px;"></i> ${d.license_number || '—'}</span>
              `}
            </div>
          </div>
          <img src="${API_BASE}/qr/${x.user_code}" style="width:96px;height:96px;background:white;border-radius:12px;padding:6px;flex-shrink:0;" alt="QR Code" onerror="this.style.display='none'">
        </div>
      </div>
    `;
  } catch (e) {
    cardEl.innerHTML = emptyState('fa-triangle-exclamation', 'Could not load card', e.message);
  }
}

document.getElementById('dlBtn').onclick = async () => {
  try {
    const res = await fetch(`${API_BASE}/card/${code}/pdf`, { headers: { Authorization: 'Bearer ' + Auth.token() }});
    if (!res.ok) throw new Error('Download failed');
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = `card-${code}.pdf`; a.click();
    URL.revokeObjectURL(url);
    toast('Downloaded', 'success');
  } catch (e) { toast(e.message, 'error'); }
};
</script>
</body></html>
